<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAO Governance Simulator - FreeCryptoStore</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#fafafa;font-family:'Manrope',system-ui,sans-serif;min-height:100vh;padding:20px}
.back{position:fixed;top:16px;left:16px;color:#f59e0b;text-decoration:none;font-size:14px;z-index:100;opacity:0.8}
.back:hover{opacity:1}
h1{text-align:center;font-size:1.8rem;margin:20px 0 6px;color:#f59e0b}
.subtitle{text-align:center;color:#888;font-size:0.9rem;margin-bottom:20px}
.container{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:#111;border:1px solid #222;border-radius:12px;padding:20px}
.panel h2{font-size:1rem;color:#f59e0b;margin-bottom:10px;font-weight:600}
label{display:block;font-size:0.8rem;color:#888;margin:8px 0 4px}
input,select,textarea{width:100%;background:#1a1a1a;border:1px solid #333;color:#fafafa;padding:8px 12px;border-radius:6px;font-family:inherit;font-size:0.85rem}
textarea{resize:vertical;min-height:50px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#f59e0b}
button{background:#f59e0b;color:#0a0a0a;border:none;padding:10px 16px;border-radius:6px;font-family:inherit;font-weight:600;cursor:pointer;font-size:0.85rem;margin-top:8px}
button:hover{background:#d97706}
button.secondary{background:#333;color:#fafafa}
button.secondary:hover{background:#444}
button.success{background:#10b981}
button.success:hover{background:#059669}
button.danger{background:#ef4444}
button.danger:hover{background:#dc2626}
.members{display:flex;flex-direction:column;gap:6px;margin:10px 0;max-height:180px;overflow-y:auto}
.member{background:#1a1a1a;border:1px solid #333;border-radius:6px;padding:8px 10px;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem}
.member .addr{color:#f59e0b;font-family:monospace;font-size:0.7rem}
.member .tokens{color:#10b981;font-weight:600}
.member .delegate{color:#8b5cf6;font-size:0.7rem}
.proposals{display:flex;flex-direction:column;gap:10px;margin:10px 0;max-height:300px;overflow-y:auto}
.proposal{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px}
.proposal .title{font-weight:600;font-size:0.85rem;margin-bottom:4px}
.proposal .desc{font-size:0.75rem;color:#888;margin-bottom:8px}
.proposal .status{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:600}
.proposal .status.active{background:#f59e0b20;color:#f59e0b}
.proposal .status.passed{background:#10b98120;color:#10b981}
.proposal .status.failed{background:#ef444420;color:#ef4444}
.proposal .status.executed{background:#3b82f620;color:#3b82f6}
.proposal .status.timelock{background:#8b5cf620;color:#8b5cf6}
.vote-bar{display:flex;height:8px;border-radius:4px;overflow:hidden;background:#222;margin:8px 0}
.vote-for{background:#10b981}
.vote-against{background:#ef4444}
.vote-abstain{background:#666}
.vote-info{display:flex;justify-content:space-between;font-size:0.7rem;color:#888}
.vote-actions{display:flex;gap:4px;margin-top:6px}
.vote-actions button{flex:1;font-size:0.7rem;padding:6px;margin:0}
.treasury{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:12px;margin-top:10px}
.treasury .balance{font-size:1.4rem;font-weight:700;color:#f59e0b}
.treasury .label{font-size:0.75rem;color:#888}
.config{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.config-item{background:#1a1a1a;border-radius:6px;padding:8px;text-align:center}
.config-item .val{font-size:1rem;font-weight:700;color:#f59e0b}
.config-item .lbl{font-size:0.65rem;color:#888}
.full-width{grid-column:1/-1}
.log{background:#0d0d0d;border:1px solid #222;border-radius:8px;padding:10px;max-height:150px;overflow-y:auto;font-size:0.7rem;font-family:monospace}
.log-entry{padding:2px 0;border-bottom:1px solid #1a1a1a;color:#888}
.log-entry .action{color:#f59e0b}
</style>
</head>
<body>
<a class="back" href="/">Back to Store</a>
<h1>DAO Governance Simulator</h1>
<p class="subtitle">Create a DAO, distribute tokens, propose and vote, execute decisions</p>

<div class="container">
  <div class="panel">
    <h2>DAO Configuration</h2>
    <label>DAO Name</label>
    <input type="text" id="daoName" value="CryptoDAO">
    <label>Quorum (%)</label>
    <input type="range" id="quorum" min="10" max="80" value="40" oninput="document.getElementById('quorumVal').textContent=this.value+'%'">
    <span id="quorumVal" style="font-size:0.8rem;color:#f59e0b">40%</span>
    <label>Pass Threshold (%)</label>
    <input type="range" id="threshold" min="50" max="90" value="60" oninput="document.getElementById('thresholdVal').textContent=this.value+'%'">
    <span id="thresholdVal" style="font-size:0.8rem;color:#f59e0b">60%</span>
    <label>Timelock (blocks)</label>
    <input type="number" id="timelock" value="3" min="0" max="20">
    <button onclick="createDAO()">Create DAO</button>

    <div class="config" id="daoConfig" style="margin-top:12px;display:none">
      <div class="config-item"><div class="val" id="cfgQuorum">--</div><div class="lbl">Quorum</div></div>
      <div class="config-item"><div class="val" id="cfgThreshold">--</div><div class="lbl">Threshold</div></div>
      <div class="config-item"><div class="val" id="cfgTimelock">--</div><div class="lbl">Timelock</div></div>
      <div class="config-item"><div class="val" id="cfgMembers">--</div><div class="lbl">Members</div></div>
    </div>
  </div>

  <div class="panel">
    <h2>Members & Tokens</h2>
    <div class="members" id="memberList"></div>
    <div style="display:flex;gap:8px">
      <button class="secondary" onclick="addMember()">Add Member</button>
      <button class="secondary" onclick="distributTokens()">Distribute Tokens</button>
    </div>
    <h2 style="margin-top:12px">Delegation</h2>
    <label>Delegate from</label>
    <select id="delegateFrom"></select>
    <label>Delegate to</label>
    <select id="delegateTo"></select>
    <button class="secondary" onclick="delegateVotes()">Delegate Votes</button>
  </div>

  <div class="panel">
    <h2>Create Proposal</h2>
    <label>Title</label>
    <input type="text" id="propTitle" placeholder="Fund new development">
    <label>Description</label>
    <textarea id="propDesc" placeholder="Allocate 5 ETH from treasury for..."></textarea>
    <label>Action</label>
    <select id="propAction">
      <option value="transfer">Transfer Treasury Funds</option>
      <option value="config">Change DAO Config</option>
      <option value="mint">Mint New Tokens</option>
      <option value="signal">Signal Vote (no execution)</option>
    </select>
    <label>Amount (ETH, if transfer)</label>
    <input type="number" id="propAmount" value="2" min="0" step="0.1">
    <button onclick="createProposal()">Submit Proposal</button>

    <div class="treasury" id="treasury">
      <div class="label">Treasury Balance</div>
      <div class="balance" id="treasuryBalance">50.0 ETH</div>
    </div>
  </div>

  <div class="panel">
    <h2>Active Proposals</h2>
    <div class="proposals" id="proposalList"></div>
  </div>

  <div class="panel full-width">
    <h2>Governance Log</h2>
    <div class="log" id="govLog"></div>
  </div>
</div>

<script>
const SHA256=(function(){const K=new Uint32Array([0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2]);function rotr(n,x){return(x>>>n)|(x<<(32-n))}return function(msg){const bytes=new TextEncoder().encode(msg);const len=bytes.length;const bl=((len+9+63)&~63);const buf=new Uint8Array(bl);buf.set(bytes);buf[len]=0x80;const dv=new DataView(buf.buffer);dv.setUint32(bl-4,len*8,false);let h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a,h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19;const w=new Uint32Array(64);for(let i=0;i<bl;i+=64){for(let j=0;j<16;j++)w[j]=dv.getUint32(i+j*4,false);for(let j=16;j<64;j++){const s0=rotr(7,w[j-15])^rotr(18,w[j-15])^(w[j-15]>>>3);const s1=rotr(17,w[j-2])^rotr(19,w[j-2])^(w[j-2]>>>10);w[j]=(w[j-16]+s0+w[j-7]+s1)|0}let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,h=h7;for(let j=0;j<64;j++){const S1=rotr(6,e)^rotr(11,e)^rotr(25,e);const ch=(e&f)^(~e&g);const t1=(h+S1+ch+K[j]+w[j])|0;const S0=rotr(2,a)^rotr(13,a)^rotr(22,a);const maj=(a&b)^(a&c)^(b&c);const t2=(S0+maj)|0;h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0}h0=(h0+a)|0;h1=(h1+b)|0;h2=(h2+c)|0;h3=(h3+d)|0;h4=(h4+e)|0;h5=(h5+f)|0;h6=(h6+g)|0;h7=(h7+h)|0}return[h0,h1,h2,h3,h4,h5,h6,h7].map(v=>(v>>>0).toString(16).padStart(8,'0')).join('')}})();

let dao = null;
let members = [];
let proposals = [];
let treasury = 50;
let proposalId = 1;

const NAMES = ['Alice', 'Bob', 'Charlie', 'Diana', 'Eve', 'Frank', 'Grace', 'Hank'];

function genAddr(seed) { return '0x' + SHA256(seed + Math.random()).slice(0, 40); }

function createDAO() {
  const name = document.getElementById('daoName').value;
  const quorum = parseInt(document.getElementById('quorum').value);
  const threshold = parseInt(document.getElementById('threshold').value);
  const timelock = parseInt(document.getElementById('timelock').value);

  dao = { name, quorum, threshold, timelock };

  // Create initial members
  members = NAMES.slice(0, 5).map((name, i) => ({
    name, addr: genAddr(name), tokens: 0, delegatedTo: null, votingPower: 0
  }));

  document.getElementById('daoConfig').style.display = 'grid';
  document.getElementById('cfgQuorum').textContent = quorum + '%';
  document.getElementById('cfgThreshold').textContent = threshold + '%';
  document.getElementById('cfgTimelock').textContent = timelock + ' blocks';
  document.getElementById('cfgMembers').textContent = members.length;

  distributTokens();
  renderMembers();
  addGovLog(`DAO "${name}" created with ${members.length} founding members`);
}

function addMember() {
  if (!dao) return alert('Create DAO first');
  const idx = members.length;
  if (idx >= NAMES.length) return;
  const m = { name: NAMES[idx], addr: genAddr(NAMES[idx]), tokens: Math.floor(Math.random() * 500) + 100, delegatedTo: null, votingPower: 0 };
  m.votingPower = m.tokens;
  members.push(m);
  document.getElementById('cfgMembers').textContent = members.length;
  renderMembers();
  addGovLog(`${m.name} joined the DAO with ${m.tokens} tokens`);
}

function distributTokens() {
  if (!dao && members.length === 0) return;
  const totalSupply = 10000;
  let remaining = totalSupply;
  members.forEach((m, i) => {
    if (i === members.length - 1) {
      m.tokens = remaining;
    } else {
      m.tokens = Math.floor(Math.random() * (remaining / (members.length - i) * 1.5)) + 200;
      remaining -= m.tokens;
    }
    m.votingPower = m.tokens;
  });
  renderMembers();
  addGovLog('Governance tokens distributed: ' + totalSupply + ' total supply');
}

function renderMembers() {
  const list = document.getElementById('memberList');
  const fromSel = document.getElementById('delegateFrom');
  const toSel = document.getElementById('delegateTo');

  list.innerHTML = members.map(m => `
    <div class="member">
      <div>
        <strong>${m.name}</strong>
        <div class="addr">${m.addr.slice(0, 10)}...${m.addr.slice(-4)}</div>
        ${m.delegatedTo ? `<div class="delegate">Delegated to ${m.delegatedTo}</div>` : ''}
      </div>
      <div>
        <span class="tokens">${m.tokens} GOV</span>
        <div style="font-size:0.7rem;color:#888">Power: ${m.votingPower}</div>
      </div>
    </div>
  `).join('');

  fromSel.innerHTML = members.map((m, i) => `<option value="${i}">${m.name} (${m.tokens} GOV)</option>`).join('');
  toSel.innerHTML = members.map((m, i) => `<option value="${i}">${m.name}</option>`).join('');
}

function delegateVotes() {
  if (!dao) return;
  const from = parseInt(document.getElementById('delegateFrom').value);
  const to = parseInt(document.getElementById('delegateTo').value);
  if (from === to) return;

  const delegator = members[from];
  const delegatee = members[to];
  delegatee.votingPower += delegator.votingPower;
  delegator.votingPower = 0;
  delegator.delegatedTo = delegatee.name;

  renderMembers();
  addGovLog(`${delegator.name} delegated ${delegator.tokens} votes to ${delegatee.name}`);
}

function createProposal() {
  if (!dao) return alert('Create DAO first');
  const title = document.getElementById('propTitle').value || 'Untitled Proposal';
  const desc = document.getElementById('propDesc').value;
  const action = document.getElementById('propAction').value;
  const amount = parseFloat(document.getElementById('propAmount').value) || 0;

  const totalPower = members.reduce((a, m) => a + m.votingPower, 0);
  const prop = {
    id: proposalId++, title, desc, action, amount,
    votesFor: 0, votesAgainst: 0, votesAbstain: 0,
    voters: new Set(), status: 'active', totalPower,
    timelockRemaining: dao.timelock
  };
  proposals.unshift(prop);
  renderProposals();
  addGovLog(`Proposal #${prop.id} created: "${title}"`);
}

function vote(propId, choice) {
  const prop = proposals.find(p => p.id === propId);
  if (!prop || prop.status !== 'active') return;

  // Simulate a random member voting (or pick one not yet voted)
  const eligible = members.filter((m, i) => !prop.voters.has(i) && m.votingPower > 0);
  if (eligible.length === 0) { checkProposal(prop); return; }

  const voter = eligible[Math.floor(Math.random() * eligible.length)];
  const voterIdx = members.indexOf(voter);
  prop.voters.add(voterIdx);

  if (choice === 'for') prop.votesFor += voter.votingPower;
  else if (choice === 'against') prop.votesAgainst += voter.votingPower;
  else prop.votesAbstain += voter.votingPower;

  addGovLog(`${voter.name} voted ${choice.toUpperCase()} on #${prop.id} (${voter.votingPower} power)`);
  checkProposal(prop);
  renderProposals();
}

function checkProposal(prop) {
  const totalVoted = prop.votesFor + prop.votesAgainst + prop.votesAbstain;
  const quorumMet = (totalVoted / prop.totalPower * 100) >= dao.quorum;
  const allVoted = prop.voters.size >= members.filter(m => m.votingPower > 0).length;

  if (quorumMet && allVoted) {
    const forPct = prop.votesFor / (prop.votesFor + prop.votesAgainst + 0.001) * 100;
    if (forPct >= dao.threshold) {
      prop.status = dao.timelock > 0 ? 'timelock' : 'passed';
      addGovLog(`Proposal #${prop.id} ${prop.status === 'timelock' ? 'PASSED - entering timelock' : 'PASSED'}`);
    } else {
      prop.status = 'failed';
      addGovLog(`Proposal #${prop.id} FAILED (${forPct.toFixed(0)}% < ${dao.threshold}% threshold)`);
    }
  }
}

function executeProposal(propId) {
  const prop = proposals.find(p => p.id === propId);
  if (!prop || (prop.status !== 'passed' && prop.status !== 'timelock')) return;

  if (prop.status === 'timelock' && prop.timelockRemaining > 0) {
    prop.timelockRemaining--;
    addGovLog(`Timelock tick: ${prop.timelockRemaining} blocks remaining for #${prop.id}`);
    if (prop.timelockRemaining <= 0) prop.status = 'passed';
    renderProposals();
    return;
  }

  prop.status = 'executed';
  if (prop.action === 'transfer' && prop.amount <= treasury) {
    treasury -= prop.amount;
    document.getElementById('treasuryBalance').textContent = treasury.toFixed(1) + ' ETH';
    addGovLog(`EXECUTED #${prop.id}: Transferred ${prop.amount} ETH from treasury`);
  } else if (prop.action === 'mint') {
    const mintTo = members[Math.floor(Math.random() * members.length)];
    mintTo.tokens += 500;
    mintTo.votingPower += 500;
    renderMembers();
    addGovLog(`EXECUTED #${prop.id}: Minted 500 tokens to ${mintTo.name}`);
  } else if (prop.action === 'config') {
    dao.quorum = Math.max(10, dao.quorum - 5);
    document.getElementById('cfgQuorum').textContent = dao.quorum + '%';
    addGovLog(`EXECUTED #${prop.id}: Quorum reduced to ${dao.quorum}%`);
  } else {
    addGovLog(`EXECUTED #${prop.id}: Signal vote recorded on-chain`);
  }
  renderProposals();
}

function renderProposals() {
  const list = document.getElementById('proposalList');
  list.innerHTML = proposals.map(prop => {
    const total = prop.votesFor + prop.votesAgainst + prop.votesAbstain || 1;
    const forPct = (prop.votesFor / total * 100).toFixed(0);
    const againstPct = (prop.votesAgainst / total * 100).toFixed(0);
    const abstainPct = (prop.votesAbstain / total * 100).toFixed(0);

    return `<div class="proposal">
      <div class="title">#${prop.id}: ${prop.title} <span class="status ${prop.status}">${prop.status.toUpperCase()}</span></div>
      <div class="desc">${prop.desc || 'No description'} ${prop.action === 'transfer' ? `(${prop.amount} ETH)` : ''}</div>
      <div class="vote-bar">
        <div class="vote-for" style="width:${forPct}%"></div>
        <div class="vote-against" style="width:${againstPct}%"></div>
        <div class="vote-abstain" style="width:${abstainPct}%"></div>
      </div>
      <div class="vote-info">
        <span>For: ${prop.votesFor} (${forPct}%)</span>
        <span>Against: ${prop.votesAgainst} (${againstPct}%)</span>
        <span>Abstain: ${prop.votesAbstain}</span>
      </div>
      ${prop.status === 'active' ? `
        <div class="vote-actions">
          <button class="success" onclick="vote(${prop.id},'for')">Vote For</button>
          <button class="danger" onclick="vote(${prop.id},'against')">Vote Against</button>
          <button class="secondary" onclick="vote(${prop.id},'abstain')">Abstain</button>
        </div>
      ` : ''}
      ${prop.status === 'passed' || prop.status === 'timelock' ? `
        <button onclick="executeProposal(${prop.id})" style="width:100%;margin-top:6px">${prop.status === 'timelock' ? `Execute (${prop.timelockRemaining} blocks left)` : 'Execute Proposal'}</button>
      ` : ''}
    </div>`;
  }).join('') || '<p style="color:#666;font-size:0.8rem">No proposals yet. Create one above.</p>';
}

function addGovLog(msg) {
  const log = document.getElementById('govLog');
  const time = new Date().toLocaleTimeString();
  log.innerHTML = `<div class="log-entry"><span class="action">[${time}]</span> ${msg}</div>` + log.innerHTML;
}

renderProposals();
</script>
<script src="/related.js"></script>
</body>
</html>
